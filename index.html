<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans','system-ui'], mono: ['JetBrains Mono','monospace'] } } }

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#070B14;color:#e2e8f0;font-family:'Plus Jakarta Sans',sans-serif}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#0d1117}
    ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .fade-up{animation:fadeUp .35s ease forwards}
    .fade-in{animation:fadeIn .2s ease forwards}
    .toast-in{animation:toastIn .3s cubic-bezier(.21,1.02,.73,1) forwards}
    .spinner{animation:spin .7s linear infinite}
    .blink{animation:blink 1.6s ease-in-out infinite}
    .nav-link{transition:all .15s ease;border-left:2px solid transparent}
    .nav-active{border-left:2px solid #38bdf8;background:rgba(56,189,248,.07);color:#38bdf8}
    .nav-link:not(.nav-active):hover{background:rgba(30,41,59,.6);color:#94a3b8}

    .type-card:hover{border-color:#38bdf8}
    .type-card.active{border-color:#38bdf8;background:rgba(56,189,248,.07)}
    .fi{width:100%;background:#0f172a;border:1.5px solid #1e293b;border-radius:10px;padding:10px 13px;font-size:.875rem;font-family:inherit;color:#e2e8f0;outline:none;transition:border-color .18s,box-shadow .18s}
    .fi:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.1)}
    .wa-preview{background:#0c2318;border-radius:12px 12px 0 12px;padding:1rem 1.2rem;font-size:.75rem;line-height:1.75;white-space:pre-wrap;border:1px solid #163d28;min-height:100px;color:#bbf7d0;font-family:'JetBrains Mono',monospace}
    .drag-over{border-color:#38bdf8!important;background:rgba(56,189,248,.03)!important}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% -15%,rgba(56,189,248,.05),transparent),radial-gradient(ellipse 50% 40% at 85% 105%,rgba(129,140,248,.04),transparent);pointer-events:none;z-index:0}
    #root{position:relative;z-index:1}

<body class="dark">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── CONSTANTS ── */
const USERS = [
  { id:'u1', email:'Admin', name:'Administrator', role:'admin', password:'admin123', initials:'AD' },
  { id:'u2', email:'Staff', name:'Staff Ops',     role:'staff', password:'staff123', initials:'SF' },
];
const DEF_CATS = [
  { id:'c1', name:'Parkir',       icon:'🅿️' },
  { id:'c2', name:'Gerbang Toll', icon:'🛣️' },
  { id:'c3', name:'Bahan Bakar',  icon:'⛽' },
  { id:'c4', name:'Lainnya',      icon:'📦' },
];
const INC_CATS = [
  { id:'i1', name:'Bonus',         icon:'🎁' },
  { id:'i2', name:'Komisi',        icon:'💰' },
  { id:'i3', name:'Reimbursement', icon:'↩️' },
  { id:'i4', name:'Lainnya',       icon:'📦' },
];
const PAY_METHODS = ['Tunai','E-Toll','Transfer Bank','GoPay','OVO','Dana'];
const MESIN_TIPE  = ['Ldx Large','Ldx Medium','Ldx Small','Rangka (Nas Med 2 Unit)','Nas Large','Nas Medium','Nas Small'];
const GS_OPEX = 'https://script.google.com/macros/s/AKfycbwXbOlO-AULsjvkz1cRB-Vbv_7_YjN1I1GYbFE5rGnXes9vFztD7ybM5TuTPxmIOSgA/exec';
const GS_WA   = 'https://script.google.com/macros/s/AKfycby7lYkxED6m0niTpZIDz5TEH0TlxOWHWW4PIktPSEmx-mwO_iAgwaoYX92o93Wdw4GL/exec';
const TIPES = [
  {v:'pemasangan',           e:'🔧',   l:'Pemasangan',     s:'Install mesin baru'},
  {v:'penarikan',            e:'📤',   l:'Penarikan',      s:'Ambil / cabut mesin'},
  {v:'pemindahan',           e:'🚚',   l:'Pemindahan',     s:'Pindah lokasi mesin'},
  {v:'penukaran',            e:'🔄',   l:'Penukaran',      s:'Tukar unit mesin',combo:false},
  {v:'pemasangan+penarikan', e:'🔧📤', l:'Pasang+Tarik',   s:'Install & cabut',combo:true},
  {v:'pemasangan+pemindahan',e:'🔧🚚', l:'Pasang+Pindah',  s:'Install & pindah',combo:true},
  {v:'pemasangan+penukaran', e:'🔧🔄', l:'Pasang+Tukar',   s:'Install & tukar',combo:true},
  {v:'penarikan+pemindahan', e:'📤🚚', l:'Tarik+Pindah',   s:'Cabut & pindah',combo:true},
  {v:'penarikan+penukaran',  e:'📤🔄', l:'Tarik+Tukar',    s:'Cabut & tukar',combo:true},
  {v:'pemindahan+penukaran', e:'🚚🔄', l:'Pindah+Tukar',   s:'Pindah & tukar',combo:true},
];

/* ── UTILS ── */
const rp    = n => `Rp ${Number(n||0).toLocaleString('id-ID')}`;
const fmtD  = s => s ? new Date(s).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) : '-';
const fmtDT = s => s ? new Date(s).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '-';
const uid   = () => `t-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
const today = () => new Date().toISOString().split('T')[0];

const DB = {
  get:(k,d=null)=>{ try{return JSON.parse(localStorage.getItem(k))??d}catch{return d} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch{} },
  rm:(k)=>localStorage.removeItem(k),
};

/* Safe Google Sheets fetch — never throws, never blocks render */
const gsPost = async (url, body) => {
  try { await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); } catch{}
};
const gsGet = async (url) => {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    const d = await r.json();
    return Array.isArray(d) ? d : [];
  } catch (e) {
    console.warn('gsGet error:', e);
    return [];
  }
};

/* ── SHARED UI ── */
const Toast = ({toasts,remove}) => (
  <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none">
    {toasts.map(t=>(
      <div key={t.id} className={`toast-in pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-xl shadow-xl border min-w-[280px] max-w-sm text-sm
        ${t.type==='success'?'bg-slate-900 border-emerald-700/50 text-emerald-300':t.type==='error'?'bg-slate-900 border-rose-700/50 text-rose-300':t.type==='warn'?'bg-slate-900 border-amber-700/50 text-amber-300':'bg-slate-900 border-slate-700 text-slate-300'}`}>
        <span className="mt-0.5 flex-shrink-0">{t.type==='success'?'✅':t.type==='error'?'❌':t.type==='warn'?'⚠️':'ℹ️'}</span>
        <span className="flex-1 leading-snug">{t.message}</span>
        <button onClick={()=>remove(t.id)} className="text-slate-600 hover:text-slate-300 text-xs">✕</button>
      </div>
    ))}
  </div>
);

const SBadge = ({s}) => {
  const c={approved:'bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/25',pending:'bg-amber-500/10 text-amber-400 ring-1 ring-amber-500/25',rejected:'bg-rose-500/10 text-rose-400 ring-1 ring-rose-500/25'};
  const l={approved:'Disetujui',pending:'Menunggu',rejected:'Ditolak'};
  return <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold ${c[s]||c.pending}`}>{l[s]||s}</span>;
};

const Spin = ({sz='md'}) => {
  const s={sm:'w-4 h-4 border-2',md:'w-5 h-5 border-2',lg:'w-7 h-7 border-[3px]'};
  return <div className={`${s[sz]} border-slate-700 border-t-sky-400 rounded-full spinner`}/>;
};

const Fi = ({label,cls='',hint,...p}) => (
  <div className={cls}>
    {label&&<label className="block text-[11px] text-slate-500 mb-1.5 font-bold uppercase tracking-wider">{label}</label>}
    <input className="fi" {...p}/>
    {hint&&<p className="text-[11px] text-slate-600 mt-1 font-mono">{hint}</p>}
  </div>
);
const Se = ({label,options,cls='',...p}) => (
  <div className={cls}>
    {label&&<label className="block text-[11px] text-slate-500 mb-1.5 font-bold uppercase tracking-wider">{label}</label>}
    <select className="fi" {...p}>{options.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
  </div>
);

const Stat = ({label,val,icon,color='sky'}) => {
  const m={sky:'border-sky-500/20 from-sky-500/5',emerald:'border-emerald-500/20 from-emerald-500/5',rose:'border-rose-500/20 from-rose-500/5',violet:'border-violet-500/20 from-violet-500/5'};
  return (
    <div className={`rounded-2xl border bg-gradient-to-br ${m[color]||m.sky} p-4 lg:p-5`}>
      <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">{label}</p>
      <div className="flex items-end justify-between gap-2">
        <p className="text-xl lg:text-2xl font-extrabold font-mono text-slate-100 truncate">{val}</p>
        <span className="text-2xl opacity-70 flex-shrink-0">{icon}</span>
      </div>
    </div>
  );
};

/* ── LOGIN ── */
const Login = ({onLogin}) => {
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const go = async e => {
    e.preventDefault(); setErr(''); setBusy(true);
    await new Promise(r=>setTimeout(r,500));
    const u = USERS.find(x=>x.email===email&&x.password===pass);
    if(u){DB.set('rc_sess',u);onLogin(u);}else setErr('Username atau password salah');
    setBusy(false);
  };
  return (
    <div className="min-h-screen bg-[#070B14] flex items-center justify-center p-4 relative overflow-hidden">
      <div className="absolute inset-0 opacity-[0.022]" style={{backgroundImage:'linear-gradient(#38bdf8 1px,transparent 1px),linear-gradient(90deg,#38bdf8 1px,transparent 1px)',backgroundSize:'44px 44px'}}/>
      <div className="absolute inset-0" style={{background:'radial-gradient(ellipse 80% 55% at 50% -5%,rgba(56,189,248,.09),transparent)'}}/>
      <div className="relative w-full max-w-sm fade-up">
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-5" style={{background:'linear-gradient(135deg,#0ea5e9,#6366f1)',boxShadow:'0 0 32px rgba(56,189,248,.25)'}}>
            <span className="text-3xl">⚡</span>
          </div>
          <h1 className="text-3xl font-extrabold text-slate-100 tracking-tight">ReCharge</h1>
          <p className="text-sm text-slate-500 mt-1.5 font-medium">Command Center · Operasional</p>
        </div>
        <div className="rounded-2xl p-7" style={{background:'rgba(15,23,42,.9)',border:'1px solid rgba(30,41,59,.8)',backdropFilter:'blur(20px)'}}>
          {err&&<div className="mb-4 flex gap-2 p-3 rounded-xl text-sm text-rose-400" style={{background:'rgba(244,63,94,.06)',border:'1px solid rgba(244,63,94,.2)'}}><span>⚠</span>{err}</div>}
          <form onSubmit={go} className="space-y-4">
            <Fi label="Username" type="text" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Admin" required/>
            <Fi label="Password" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/>
            <button type="submit" disabled={busy} className="w-full py-3 rounded-xl font-bold text-sm mt-1 flex items-center justify-center gap-2 transition-opacity" style={{background:'linear-gradient(135deg,#0ea5e9,#6366f1)',color:'#fff',boxShadow:'0 6px 20px rgba(14,165,233,.22)',opacity:busy?.55:1}}>
              {busy?<><Spin sz="sm"/><span>Memproses...</span></>:'Masuk ke Dashboard →'}
            </button>
          </form>
          <p className="text-center text-[11px] text-slate-700 font-mono mt-5 pt-4" style={{borderTop:'1px solid rgba(30,41,59,.8)'}}>Admin/admin123 · Staff/staff123</p>
        </div>
      </div>
    </div>
  );
};

/* ── SIDEBAR ── */
const Sidebar = ({view,setView,user,logout,open,setOpen}) => {
  const nav = [
    {sec:'OpEx Tracker'},
    {id:'dashboard',   icon:'📊',label:'Dashboard'},
    {id:'upload',      icon:'📎',label:'Upload Transaksi'},
    {id:'txnlist',     icon:'📋',label:'Daftar Transaksi'},

    {id:'wa',          icon:'💬',label:'Konfirmasi WA Mesin'},
  ];
  return (
    <>
      {open&&<div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 lg:hidden" onClick={()=>setOpen(false)}/>}

        style={{background:'rgba(7,11,20,.98)',borderRight:'1px solid rgba(30,41,59,.7)'}}>
        <div className="flex items-center gap-3 px-5 py-5" style={{borderBottom:'1px solid rgba(30,41,59,.7)'}}>
          <div className="w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{background:'linear-gradient(135deg,#0ea5e9,#6366f1)'}}>⚡</div>
          <div className="flex-1 min-w-0">
            <p className="text-sm font-extrabold text-slate-100">ReCharge</p>
            <p className="text-[10px] text-slate-600 font-mono uppercase tracking-widest">Command Center</p>
          </div>
          <button className="lg:hidden text-slate-600 hover:text-slate-300 text-sm" onClick={()=>setOpen(false)}>✕</button>
        </div>
        <nav className="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">

              {n.id==='wa'&&<span className="text-[9px] font-bold text-emerald-400 px-1.5 py-0.5 rounded-full" style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.2)'}}>WA</span>}

        <div className="p-4" style={{borderTop:'1px solid rgba(30,41,59,.7)'}}>
          <div className="flex items-center gap-3 px-3 py-3 rounded-xl" style={{background:'rgba(15,23,42,.8)'}}>
            <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-sky-400 flex-shrink-0" style={{background:'rgba(14,165,233,.1)',border:'1px solid rgba(14,165,233,.2)'}}>{user.initials}</div>
            <div className="flex-1 min-w-0">
              <p className="text-xs font-bold text-slate-200 truncate">{user.name}</p>
              <p className="text-[10px] text-slate-600 capitalize">{user.role}</p>

            <button onClick={logout} className="text-slate-700 hover:text-rose-400 transition-colors">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

          </div>
        </div>
      </aside>

  );
};

/* ── DASHBOARD ── */
const Dashboard = ({txns,incomes,user,setView}) => {
  const s = useMemo(()=>{
    const totalExp = txns.reduce((a,t)=>a+Number(t.amount||0),0);
    const totalInc = incomes.reduce((a,t)=>a+Number(t.amount||0),0);
    const pending  = txns.filter(t=>t.status==='pending').length;
    const todayAmt = txns.filter(t=>t.transaction_date===today()).reduce((a,t)=>a+Number(t.amount||0),0);
    const bycat={};
    txns.filter(t=>t.status!=='rejected').forEach(t=>{bycat[t.category]=(bycat[t.category]||0)+Number(t.amount||0);});
    return {totalExp,totalInc,net:totalInc-totalExp,pending,todayAmt,catArr:Object.entries(bycat).sort((a,b)=>b[1]-a[1])};
  },[txns,incomes]);
  const recent = useMemo(()=>[...txns].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,7),[txns]);
  const maxCat = s.catArr[0]?.[1]||1;
  return (
    <div className="space-y-6 fade-up">
      <div className="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 className="text-2xl font-extrabold text-slate-100">Dashboard</h1>
          <p className="text-sm text-slate-500">Selamat datang, <span className="text-slate-300 font-semibold">{user.name}</span></p>
        </div>
        <div className="flex gap-2">
          <button onClick={()=>setView('wa')} className="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all" style={{background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.2)',color:'#4ade80'}}>💬 Kirim WA</button>
          <button onClick={()=>setView('upload')} className="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold text-slate-950" style={{background:'linear-gradient(135deg,#0ea5e9,#6366f1)',boxShadow:'0 4px 14px rgba(14,165,233,.18)'}}>⬆️ Upload</button>
        </div>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        <Stat label="Pemasukan"   val={rp(s.totalInc)} icon="💵" color="emerald"/>
        <Stat label="Pengeluaran" val={rp(s.totalExp)} icon="💸" color="rose"/>
        <Stat label="Net Balance" val={rp(s.net)}      icon="📊" color={s.net>=0?'sky':'rose'}/>
        <Stat label="Hari Ini"    val={rp(s.todayAmt)} icon="📅" color="violet"/>
      </div>
      <div className="grid lg:grid-cols-5 gap-4">
        <div className="lg:col-span-2 rounded-2xl p-5" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
          <p className="text-sm font-bold text-slate-300 mb-4">Pengeluaran per Kategori</p>
          {s.catArr.length===0
            ?<div className="py-10 text-center text-slate-700"><div className="text-3xl mb-2">📊</div><p className="text-sm">Belum ada data</p></div>
            :s.catArr.slice(0,6).map(([cat,amt])=>{
              const icon=DEF_CATS.find(c=>c.name===cat)?.icon||'📦';
              return <div key={cat} className="mb-3">
                <div className="flex items-center justify-between text-xs mb-1.5">
                  <span className="text-slate-400">{icon} {cat}</span>
                  <span className="font-mono text-slate-300 font-semibold">{rp(amt)}</span>
                </div>
                <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                  <div className="h-full rounded-full bar-fill" style={{width:`${(amt/maxCat)*100}%`,background:'linear-gradient(90deg,#0ea5e9,#818cf8)'}}/>
                </div>
              </div>;
            })
          }
        </div>
        <div className="lg:col-span-3 rounded-2xl p-5" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
          <div className="flex items-center justify-between mb-4">

/* ── UPLOAD ── */
const Upload = ({cats,user,onSave,toast}) => {
  const [files,setFiles]=useState([]);
  const [idx,setIdx]=useState(0);
  const [drag,setDrag]=useState(false);
  const [form,setForm]=useState({transaction_date:today(),merchant_name:'',amount:'',category:'',payment_method:'',notes:''});
  const ref=useRef();
  const compress=file=>new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const M=1200;let{width:w,height:h}=img;if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res({preview:c.toDataURL('image/jpeg',.82),name:file.name});};img.src=e.target.result;};
    r.readAsDataURL(file);
  });
  const load=raw=>{const v=Array.from(raw).filter(f=>f.type.startsWith('image/'));if(!v.length){toast('Hanya file gambar','error');return;}Promise.all(v.map(compress)).then(r=>{setFiles(r);setIdx(0);setForm({transaction_date:today(),merchant_name:'',amount:'',category:'',payment_method:'',notes:'',});});};
  const save=async()=>{
    if(!form.merchant_name.trim())return toast('Nama merchant wajib','error');
    if(!form.amount||isNaN(+form.amount))return toast('Nominal harus angka','error');
    if(!form.category)return toast('Pilih kategori','error');
    const t={id:uid(),transaction_date:form.transaction_date,merchant_name:form.merchant_name.trim(),amount:+form.amount,category:form.category,payment_method:form.payment_method,notes:form.notes,receipt_image_url:files[idx]?.preview||null,status:'pending',created_by:user.id,created_at:new Date().toISOString()};
    onSave(t); gsPost(GS_OPEX,{...t,type:'expense'});
    toast('✅ Transaksi disimpan!','success');
    setFiles([]); setForm({transaction_date:today(),merchant_name:'',amount:'',category:'',payment_method:'',notes:''});
  };
  const allCats=[...cats,...DEF_CATS.filter(d=>!cats.find(c=>c.id===d.id))];
  return (
    <div className="max-w-4xl space-y-5 fade-up">
      <div><h1 className="text-2xl font-extrabold text-slate-100">Upload Transaksi</h1><p className="text-sm text-slate-500 mt-0.5">Upload foto struk dan isi detail transaksi</p></div>
      {files.length===0
        ?<div onDrop={e=>{e.preventDefault();setDrag(false);load(e.dataTransfer.files);}} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onClick={()=>ref.current?.click()}
            className={`border-2 border-dashed rounded-2xl py-16 flex flex-col items-center justify-center cursor-pointer transition-all ${drag?'drag-over':''}`}
            style={{borderColor:drag?'#38bdf8':'#1e293b',background:drag?'rgba(56,189,248,.03)':'rgba(15,23,42,.5)'}}>
          <div className={`text-5xl mb-4 transition-transform ${drag?'scale-110':''}`}>📎</div>
          <p className="text-slate-300 font-bold mb-1">Drop foto struk di sini</p>
          <p className="text-sm text-slate-500 mb-3">atau klik untuk pilih file</p>
          <div className="flex gap-4 text-xs text-slate-600"><span>📷 JPG</span><span>🖼️ PNG</span><span>📄 Multi OK</span></div>
          <input ref={ref} type="file" accept="image/*" multiple className="hidden" onChange={e=>load(e.target.files)}/>
        </div>
        :<div className="grid lg:grid-cols-2 gap-5">
          <div className="flex flex-col gap-3">
            {files.length>1&&<div className="flex gap-2 overflow-x-auto pb-1">{files.map((f,i)=><button key={i} onClick={()=>setIdx(i)} className={`flex-shrink-0 w-14 h-14 rounded-xl overflow-hidden border-2 transition-all ${i===idx?'border-sky-500':'border-slate-700 opacity-50'}`}><img src={f.preview} className="w-full h-full object-cover"/></button>)}</div>}
            <div className="rounded-2xl overflow-hidden" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)',minHeight:220}}><img src={files[idx].preview} className="w-full h-auto max-h-80 object-contain"/></div>
            <button onClick={()=>setFiles([])} className="w-full py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:text-slate-300 transition-colors" style={{border:'1px solid rgba(30,41,59,.7)'}}>↩ Ganti Foto</button>
          </div>
          <div className="rounded-2xl p-5 space-y-4" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
            <p className="text-sm font-bold text-slate-300">Detail Transaksi</p>
            <Fi label="Tanggal" type="date" value={form.transaction_date} onChange={e=>setForm(f=>({...f,transaction_date:e.target.value}))}/>
            <Fi label="Merchant / Tempat" type="text" value={form.merchant_name} onChange={e=>setForm(f=>({...f,merchant_name:e.target.value}))} placeholder="Nama toko, lokasi..."/>
            <div>
              <label className="block text-[11px] text-slate-500 mb-1.5 font-bold uppercase tracking-wider">Nominal (Rp)</label>
              <div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-slate-500 font-mono">Rp</span><input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0" className="fi pl-9"/></div>
              {form.amount&&!isNaN(+form.amount)&&<p className="text-[11px] text-slate-600 mt-1 font-mono">{rp(form.amount)}</p>}
            </div>
            <Se label="Kategori" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} options={[['','— Pilih —'],...allCats.map(c=>[c.name,`${c.icon} ${c.name}`])]}/>
            <Se label="Metode Pembayaran" value={form.payment_method} onChange={e=>setForm(f=>({...f,payment_method:e.target.value}))} options={[['','— Pilih —'],...PAY_METHODS.map(m=>[m,m])]}/>
            <div><label className="block text-[11px] text-slate-500 mb-1.5 font-bold uppercase tracking-wider">Catatan</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} placeholder="Keterangan singkat..." className="fi resize-none"/></div>
            <button onClick={save} className="w-full py-3 rounded-xl font-bold text-sm transition-all" style={{background:'linear-gradient(135deg,#0ea5e9,#6366f1)',color:'#fff',boxShadow:'0 4px 14px rgba(14,165,233,.18)'}}>💾 Simpan Transaksi</button>
          </div>
        </div>
      }
    </div>
  );
};

/* ── TXN LIST ── */
const TxnList = ({txns,cats,user,onUpdate,toast}) => {
  const [q,setQ]=useState('');
  const [fCat,setFCat]=useState('');
  const [fStat,setFStat]=useState('');
  const [sort,setSort]=useState({k:'created_at',d:-1});
  const [page,setPage]=useState(1);
  const [detail,setDetail]=useState(null);
  const PER=12;
  const allCats=[...cats,...DEF_CATS.filter(d=>!cats.find(c=>c.id===d.id))];

  const filtered=useMemo(()=>{
    let r=[...txns];
    if(q){const ql=q.toLowerCase();r=r.filter(t=>t.merchant_name?.toLowerCase().includes(ql)||t.notes?.toLowerCase().includes(ql));}
    if(fCat)r=r.filter(t=>t.category===fCat);
    if(fStat)r=r.filter(t=>t.status===fStat);
    r.sort((a,b)=>{const av=a[sort.k],bv=b[sort.k];return typeof av==='number'?sort.d*(av-bv):sort.d*String(av||'').localeCompare(String(bv||''));});
    return r;
  },[txns,q,fCat,fStat,sort]);

  const pages=Math.max(1,Math.ceil(filtered.length/PER));
  const paged=filtered.slice((page-1)*PER,page*PER);
  const total=filtered.reduce((s,t)=>s+Number(t.amount||0),0);

  const expCSV=()=>{
    const h='Tanggal,Merchant,Nominal,Kategori,Metode,Status,Catatan';
    const rows=filtered.map(t=>[t.transaction_date,`"${t.merchant_name}"`,t.amount,t.category,t.payment_method||'',t.status,`"${t.notes||''}"`].join(','));
    const b=new Blob([h+'\n'+rows.join('\n')],{type:'text/csv'});
    Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:`opex-${Date.now()}.csv`}).click();
    toast('Export CSV berhasil','success');
  };
  const expXLS=()=>{
    try{
      const d=filtered.map(t=>({Tanggal:t.transaction_date,Merchant:t.merchant_name,Nominal:t.amount,Kategori:t.category,Metode:t.payment_method||'-',Status:t.status,Catatan:t.notes||''}));
      const ws=XLSX.utils.json_to_sheet(d);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Transaksi');XLSX.writeFile(wb,`opex-${Date.now()}.xlsx`);
      toast('Export Excel berhasil','success');
    }catch{toast('Gagal export Excel','error');}
  };
  const expPDF=()=>{
    try{
      const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape'});
      doc.setFontSize(13);doc.text('Laporan Transaksi OpEx — ReCharge',14,16);
      doc.setFontSize(9);doc.setTextColor(120);doc.text(`${new Date().toLocaleString('id-ID')} | Total: ${rp(total)} | ${filtered.length} transaksi`,14,23);
      doc.autoTable({head:[['Tanggal','Merchant','Nominal','Kategori','Metode','Status','Catatan']],body:filtered.map(t=>[t.transaction_date,t.merchant_name,rp(t.amount),t.category,t.payment_method||'-',t.status,t.notes||'']),startY:28,theme:'grid',styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[7,11,20],textColor:[200,200,200]},alternateRowStyles:{fillColor:[248,248,248]}});
      doc.save(`opex-${Date.now()}.pdf`);
      toast('Export PDF berhasil','success');
    }catch(e){toast('Gagal export PDF','error');}
  };

  const TH=({k,ch})=><th onClick={()=>{setSort(s=>s.k===k?{k,d:-s.d}:{k,d:-1});setPage(1);}} className="px-4 py-3 text-left text-[11px] font-bold text-slate-500 uppercase tracking-wider cursor-pointer hover:text-slate-300 select-none whitespace-nowrap">{ch}{sort.k===k?(sort.d===-1?' ↓':' ↑'):''}</th>;

  return (
    <div className="space-y-4 fade-up">
      <div className="flex flex-wrap items-start justify-between gap-3">
        <div><h1 className="text-2xl font-extrabold text-slate-100">Daftar Transaksi</h1><p className="text-sm text-slate-500">{filtered.length} data · Total: <span className="font-mono text-sky-400 font-bold">{rp(total)}</span></p></div>
        <div className="flex gap-2">
          <button onClick={expCSV} className="text-xs font-semibold px-3 py-1.5 rounded-xl text-slate-400 hover:text-slate-200 transition-colors" style={{border:'1px solid rgba(30,41,59,.8)'}}>⬇ CSV</button>
          <button onClick={expXLS} className="text-xs font-semibold px-3 py-1.5 rounded-xl text-slate-400 hover:text-slate-200 transition-colors" style={{border:'1px solid rgba(30,41,59,.8)'}}>⬇ Excel</button>
          <button onClick={expPDF} className="text-xs font-semibold px-3 py-1.5 rounded-xl text-slate-400 hover:text-slate-200 transition-colors" style={{border:'1px solid rgba(30,41,59,.8)'}}>⬇ PDF</button>
        </div>
      </div>

      <div className="rounded-2xl p-4" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <div className="col-span-2"><input value={q} onChange={e=>{setQ(e.target.value);setPage(1);}} placeholder="🔍 Cari merchant..." className="fi w-full"/></div>
          <select value={fCat} onChange={e=>{setFCat(e.target.value);setPage(1);}} className="fi"><option value="">Semua Kategori</option>{allCats.map(c=><option key={c.id} value={c.name}>{c.icon} {c.name}</option>)}</select>
          <div className="flex gap-2">
            <select value={fStat} onChange={e=>{setFStat(e.target.value);setPage(1);}} className="fi flex-1"><option value="">Semua Status</option><option value="pending">⏳ Menunggu</option><option value="approved">✅ Disetujui</option><option value="rejected">❌ Ditolak</option></select>
            {(q||fCat||fStat)&&<button onClick={()=>{setQ('');setFCat('');setFStat('');setPage(1);}} className="px-2.5 rounded-xl text-xs text-slate-500 hover:text-slate-200" style={{border:'1px solid rgba(30,41,59,.8)'}}>✕</button>}
          </div>
        </div>
      </div>

      <div className="rounded-2xl overflow-hidden" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead style={{borderBottom:'1px solid rgba(30,41,59,.8)'}}>
              <tr><TH k="transaction_date" ch="Tanggal"/><TH k="merchant_name" ch="Merchant"/><TH k="amount" ch="Nominal"/><th className="px-4 py-3 text-left text-[11px] font-bold text-slate-500 uppercase tracking-wider">Kategori</th><th className="px-4 py-3 text-left text-[11px] font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap">Metode</th><TH k="status" ch="Status"/><th className="px-4 py-3 w-6"></th></tr>
            </thead>
            <tbody>
              {paged.length===0
                ?<tr><td colSpan={7} className="py-16 text-center"><div className="text-3xl mb-2">🔍</div><p className="text-sm text-slate-600">Tidak ada data</p></td></tr>
                :paged.map(t=>(
                  <tr key={t.id} className="row-hover cursor-pointer transition-colors" style={{borderBottom:'1px solid rgba(30,41,59,.4)'}} onClick={()=>setDetail(t)}>
                    <td className="px-4 py-3.5 text-slate-400 text-xs whitespace-nowrap">{fmtD(t.transaction_date)}</td>
                    <td className="px-4 py-3.5 max-w-[180px]"><p className="text-slate-200 font-semibold truncate">{t.merchant_name}</p>{t.notes&&<p className="text-slate-600 text-xs truncate">{t.notes}</p>}</td>
                    <td className="px-4 py-3.5 font-mono font-bold text-slate-100 whitespace-nowrap">{rp(t.amount)}</td>
                    <td className="px-4 py-3.5"><span className="text-xs text-slate-400">{DEF_CATS.find(c=>c.name===t.category)?.icon||'📦'} {t.category}</span></td>
                    <td className="px-4 py-3.5 text-slate-500 text-xs whitespace-nowrap">{t.payment_method||'—'}</td>
                    <td className="px-4 py-3.5"><SBadge s={t.status}/></td>
                    <td className="px-4 py-3.5 text-slate-700 text-xs">›</td>
                  </tr>
                ))
              }
            </tbody>
          </table>
        </div>
        {pages>1&&(
          <div className="flex items-center justify-between px-4 py-3" style={{borderTop:'1px solid rgba(30,41,59,.7)'}}>
            <p className="text-xs text-slate-600">Hal <span className="text-slate-400 font-bold">{page}</span> / {pages}</p>
            <div className="flex gap-1">
              {[['«',1],['‹',page-1],['›',page+1],['»',pages]].map(([l,p])=>(
                <button key={l} disabled={l==='«'||l==='‹'?page===1:page===pages} onClick={()=>setPage(Math.max(1,Math.min(pages,p)))}
                  className="w-7 h-7 text-xs rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-500 disabled:opacity-25 transition-colors">{l}</button>
              ))}
            </div>
          </div>
        )}
      </div>

      {detail&&(
        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in" onClick={()=>setDetail(null)}>
          <div className="rounded-2xl w-full max-w-lg overflow-hidden fade-up" onClick={e=>e.stopPropagation()} style={{background:'rgba(15,23,42,.99)',border:'1px solid rgba(30,41,59,.9)',boxShadow:'0 32px 64px rgba(0,0,0,.5)'}}>
            <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid rgba(30,41,59,.8)'}}>
              <div className="flex items-center gap-2"><span className="text-lg">{DEF_CATS.find(c=>c.name===detail.category)?.icon||'📦'}</span><h3 className="font-bold text-slate-100 text-sm">Detail Transaksi</h3></div>
              <button onClick={()=>setDetail(null)} className="text-slate-500 hover:text-slate-200 text-xl">×</button>
            </div>
            {detail.receipt_image_url&&<div className="max-h-48 overflow-hidden flex items-center justify-center" style={{background:'rgba(7,11,20,.8)',borderBottom:'1px solid rgba(30,41,59,.8)'}}><img src={detail.receipt_image_url} className="max-h-48 w-auto object-contain"/></div>}
            <div className="p-5 space-y-4">
              <div className="text-center py-3 rounded-xl" style={{background:'rgba(14,165,233,.06)',border:'1px solid rgba(14,165,233,.15)'}}>
                <p className="text-xs text-slate-500 mb-1">Nominal</p>
                <p className="text-3xl font-extrabold font-mono text-sky-400">{rp(detail.amount)}</p>
              </div>
              <div className="grid grid-cols-2 gap-2.5">
                {[{l:'Merchant',v:detail.merchant_name},{l:'Tanggal',v:fmtD(detail.transaction_date)},{l:'Kategori',v:detail.category},{l:'Metode',v:detail.payment_method||'—'},{l:'Dibuat',v:fmtDT(detail.created_at)},{l:'Status',v:<SBadge s={detail.status}/>}].map(({l,v})=>(
                  <div key={l} className="rounded-xl p-3" style={{background:'rgba(30,41,59,.5)'}}>
                    <p className="text-[10px] text-slate-600 uppercase tracking-wider mb-0.5">{l}</p>
                    <div className="text-sm font-semibold text-slate-200">{v}</div>
                  </div>
                ))}
              </div>
              {detail.notes&&<div className="rounded-xl px-3 py-2.5" style={{background:'rgba(30,41,59,.4)'}}><p className="text-[10px] text-slate-600 uppercase tracking-wider mb-1">Catatan</p><p className="text-sm text-slate-300">{detail.notes}</p></div>}
              {user.role==='admin'&&detail.status==='pending'&&(
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={()=>{onUpdate(detail.id,{status:'approved'});toast('✅ Disetujui','success');setDetail(null);}} className="py-2.5 font-bold text-sm rounded-xl text-white" style={{background:'rgba(16,185,129,.8)'}}>✓ Setujui</button>
                  <button onClick={()=>{onUpdate(detail.id,{status:'rejected'});toast('Ditolak','warn');setDetail(null);}} className="py-2.5 font-bold text-sm rounded-xl text-white" style={{background:'rgba(225,29,72,.7)'}}>✕ Tolak</button>
                </div>

              {user.role==='admin'&&detail.status==='approved'&&(
                <button onClick={()=>{onUpdate(detail.id,{status:'rejected'});toast('Dibatalkan','warn');setDetail(null);}} className="w-full py-2.5 font-semibold text-sm rounded-xl text-rose-400 transition-all" style={{border:'1px solid rgba(225,29,72,.25)'}}>Batalkan Persetujuan</button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

          <Fi label="Tanggal" type="date" value={form.income_date} onChange={e=>setForm(f=>({...f,income_date:e.target.value}))}/>
          <Se label="Kategori" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} options={INC_CATS.map(c=>[c.id,`${c.icon} ${c.name}`])}/>
        </div>
        <Fi label="Deskripsi / Sumber" type="text" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Bonus, Komisi, Reimbursement..."/>
        <div>
          <label className="block text-[11px] text-slate-500 mb-1.5 font-bold uppercase tracking-wider">Nominal (Rp)</label>
          <div className="flex gap-2 items-center"><span className="text-sm text-slate-500">Rp</span><input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0" className="fi flex-1"/></div>
          {form.amount&&!isNaN(+form.amount)&&<p className="text-[11px] text-emerald-600 mt-1 font-mono font-bold">{rp(form.amount)}</p>}
        </div>
        <div><label className="block text-[11px] text-slate-500 mb-1.5 font-bold uppercase tracking-wider">Catatan</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} placeholder="Keterangan..." className="fi resize-none"/></div>
        <button onClick={save} className="w-full py-3 rounded-xl font-bold text-sm text-white" style={{background:'linear-gradient(135deg,#10b981,#059669)',boxShadow:'0 4px 14px rgba(16,185,129,.18)'}}>💵 Simpan Pemasukan</button>
      </div>
    </div>
  );
};

/* ── WA KONFIRMASI ── */
const buildMsg = (form, tipe) => {
  const {nama,nomor,jenisMesin,jumlahMesin,tanggal,jamMulai,jamSelesai,lokasi,lokasiTujuan,mesinPengganti,catatan}=form;
  const tgl = tanggal ? new Date(tanggal+'T00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '[tanggal]';
  const jam = jamMulai&&jamSelesai ? `${jamMulai} s/d ${jamSelesai}` : jamMulai||'-';
  const labels={
    'pemasangan':'KONFIRMASI PEMASANGAN MESIN','penarikan':'KONFIRMASI PENARIKAN MESIN','pemindahan':'KONFIRMASI PEMINDAHAN MESIN','penukaran':'KONFIRMASI PENUKARAN MESIN',
    'pemasangan+penarikan':'KONFIRMASI PEMASANGAN & PENARIKAN','pemasangan+pemindahan':'KONFIRMASI PEMASANGAN & PEMINDAHAN','pemasangan+penukaran':'KONFIRMASI PEMASANGAN & PENUKARAN',
    'penarikan+pemindahan':'KONFIRMASI PENARIKAN & PEMINDAHAN','penarikan+penukaran':'KONFIRMASI PENARIKAN & PENUKARAN','pemindahan+penukaran':'KONFIRMASI PEMINDAHAN & PENUKARAN',
  };
  const details={
    'pemasangan':'Mesin ReCharge akan dipasang di lokasi.','penarikan':'Mesin ReCharge di lokasi akan kami tarik.',
    'pemindahan':'Mesin ReCharge akan kami pindahkan ke lokasi baru.','penukaran':'Mesin ReCharge akan kami tukar dengan unit baru.',
    'pemasangan+penarikan':'Mesin ReCharge akan dipasang di lokasi baru, sekaligus penarikan mesin lama.',
    'pemasangan+pemindahan':'Mesin ReCharge akan dipasang sekaligus dipindahkan ke lokasi baru.',
    'pemasangan+penukaran':'Mesin ReCharge akan dipasang sekaligus ditukar dengan unit baru.',
    'penarikan+pemindahan':'Mesin ReCharge akan kami tarik sekaligus dipindahkan ke lokasi baru.',
    'penarikan+penukaran':'Mesin ReCharge akan kami tarik sekaligus ditukar dengan unit baru.',
    'pemindahan+penukaran':'Mesin ReCharge akan dipindahkan ke lokasi baru sekaligus ditukar dengan unit baru.',
  };
  const needPindah=['pemindahan','pemasangan+pemindahan','penarikan+pemindahan','pemindahan+penukaran'].includes(tipe);
  const needTukar=['penukaran','pemasangan+penukaran','penarikan+penukaran','pemindahan+penukaran'].includes(tipe);
  let extra='';
  if(needPindah&&lokasiTujuan)extra+=`Lokasi Tujuan : ${lokasiTujuan}\n`;
  if(needTukar&&mesinPengganti)extra+=`Mesin Baru    : ${mesinPengganti}\n`;
  const jml=jumlahMesin?`\nJumlah Mesin : ${jumlahMesin} unit`:'';
  return `${labels[tipe]||'KONFIRMASI MESIN'}

Hallo Bapak/Ibu ${nama||'[Nama Customer]'},
Perkenalkan saya Asep dari Tim Operasional ReCharge
Ingin Konfirmasi bahwa ${details[tipe]||''}

Detail:
───────────────────
Nama PIC       : ${nama||'-'}
Mesin          : ${nomor||'-'}${jenisMesin?'\nTipe Mesin   : '+jenisMesin:''}${jml}
Tanggal        : ${tgl}
Estimasi Jam   : ${jam}
Lokasi         : ${lokasi||'-'}
${extra}${catatan?`Catatan      :\n${catatan}\n`:''}
───────────────────
Tim Kami sedang Menuju Ke lokasi

Terima kasih 🙏
Tim Operasional ReCharge`;
};

const WA = ({toast}) => {
  const [tipe,setTipe]=useState('pemasangan');
  const [form,setForm]=useState({nama:'',wa:'',nomor:'ReCharge Power Bank',jenisMesin:'',jumlahMesin:'1',tanggal:today(),jamMulai:'09:00',jamSelesai:'12:00',lokasi:'',lokasiTujuan:'',mesinPengganti:'',catatan:''});
  const [logs,setLogs]=useState([]);
  const [busy,setBusy]=useState(false);
  const needPindah=['pemindahan','pemasangan+pemindahan','penarikan+pemindahan','pemindahan+penukaran'].includes(tipe);
  const needTukar=['penukaran','pemasangan+penukaran','penarikan+penukaran','pemindahan+penukaran'].includes(tipe);
  const pesan=useMemo(()=>buildMsg(form,tipe),[form,tipe]);
  const log=(msg,s)=>setLogs(p=>[{msg,s,t:new Date().toLocaleTimeString('id-ID'),id:Math.random()},...p]);
  const fmtNo=no=>{no=no.replace(/\D/g,'');if(no.startsWith('0'))no='62'+no.slice(1);if(!no.startsWith('62'))no='62'+no;return no;};
  const send=async()=>{
    if(!form.nama)return alert('Nama customer wajib diisi.');
    if(!form.wa)return alert('Nomor WhatsApp wajib diisi.');
    if(!form.tanggal)return alert('Tanggal wajib diisi.');
    setBusy(true);setLogs([]);
    log('Menyimpan data ke Google Sheets...','wait');
    try{await fetch(GS_WA,{method:'POST',body:JSON.stringify({...form,tipe,pesan,timestamp:new Date().toISOString()})});log('✅ Data tersimpan ke Google Sheets.','ok');}
    catch{log('⚠️ Gagal simpan ke Sheets (lanjut ke WA).','err');}
    log('Membuka WhatsApp...','wait');
    try{window.open(`https://wa.me/${fmtNo(form.wa)}?text=${encodeURIComponent(pesan)}`,'_blank');log('✅ WhatsApp terbuka — klik Send!','ok');toast('WhatsApp berhasil dibuka!','success');}
    catch(e){log(`❌ Gagal buka WA: ${e.message}`,'err');}
    setBusy(false);
  };
  return (
    <div className="max-w-3xl space-y-5 fade-up">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div><h1 className="text-2xl font-extrabold text-slate-100">Konfirmasi Mesin via WA</h1><p className="text-sm text-slate-500 mt-0.5">Kirim pesan konfirmasi otomatis ke customer</p></div>
        <div className="flex items-center gap-2 px-3 py-1.5 rounded-xl text-xs font-bold text-emerald-400" style={{background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.15)'}}><span className="w-2 h-2 bg-emerald-400 rounded-full blink"></span>wa.me · Gratis</div>
      </div>

      {/* Tipe */}
      <div className="rounded-2xl p-5 space-y-3" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
        <p className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">📋 Tipe Konfirmasi</p>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
          {TIPES.filter(t=>!t.combo).map(t=>(
            <div key={t.v} onClick={()=>setTipe(t.v)} className={`type-card ${tipe===t.v?'active':''}`}>
              <span className="text-xl flex-shrink-0">{t.e}</span>
              <div><p className="text-sm font-bold text-slate-200">{t.l}</p><p className="text-[11px] text-slate-600">{t.s}</p></div>
            </div>
          ))}
        </div>
        <p className="text-[10px] font-bold text-slate-700 uppercase tracking-widest mt-2">🔀 Kombinasi</p>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
          {TIPES.filter(t=>t.combo).map(t=>(
            <div key={t.v} onClick={()=>setTipe(t.v)} className={`type-card ${tipe===t.v?'active':''}`}>
              <span className="text-lg flex-shrink-0">{t.e}</span>
              <div><p className="text-xs font-bold text-slate-200">{t.l}</p><p className="text-[10px] text-slate-600">{t.s}</p></div>
            </div>
          ))}
        </div>
      </div>

      {/* Form */}
      <div className="rounded-2xl p-5 space-y-4" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
        <p className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">👤 Data Customer & Jadwal</p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <Fi label="Nama Customer *" type="text" value={form.nama} onChange={e=>setForm(f=>({...f,nama:e.target.value}))} placeholder="Budi Santoso"/>
          <Fi label="No. WhatsApp *" type="tel" value={form.wa} onChange={e=>setForm(f=>({...f,wa:e.target.value}))} placeholder="08123456789"/>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <Fi label="Nama Mesin *" type="text" value={form.nomor} onChange={e=>setForm(f=>({...f,nomor:e.target.value}))}/>
          <Se label="Tipe Mesin" value={form.jenisMesin} onChange={e=>setForm(f=>({...f,jenisMesin:e.target.value}))} options={[['','Pilih tipe...'],...MESIN_TIPE.map(m=>[m,m])]}/>
          <Fi label="Jumlah Mesin *" type="number" value={form.jumlahMesin} onChange={e=>setForm(f=>({...f,jumlahMesin:e.target.value}))} min="1"/>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <Fi label="Tanggal Jadwal *" type="date" value={form.tanggal} onChange={e=>setForm(f=>({...f,tanggal:e.target.value}))}/>
          <div>
            <label className="block text-[11px] text-slate-500 mb-1.5 font-bold uppercase tracking-wider">Estimasi Jam</label>
            <div className="flex items-center gap-2"><input type="time" value={form.jamMulai} onChange={e=>setForm(f=>({...f,jamMulai:e.target.value}))} className="fi flex-1"/><span className="text-slate-600 font-bold text-xs">s/d</span><input type="time" value={form.jamSelesai} onChange={e=>setForm(f=>({...f,jamSelesai:e.target.value}))} className="fi flex-1"/></div>
          </div>
        </div>
        <Fi label="Lokasi" type="text" value={form.lokasi} onChange={e=>setForm(f=>({...f,lokasi:e.target.value}))} placeholder="Nama Lokasi"/>
        {needPindah&&<Fi label="Lokasi Tujuan (Pemindahan)" type="text" value={form.lokasiTujuan} onChange={e=>setForm(f=>({...f,lokasiTujuan:e.target.value}))} placeholder="Lokasi Tujuan"/>}
        {needTukar&&<Se label="Mesin Pengganti (Penukaran)" value={form.mesinPengganti} onChange={e=>setForm(f=>({...f,mesinPengganti:e.target.value}))} options={[['','Pilih tipe...'],...MESIN_TIPE.filter(m=>!m.includes('Rangka')).map(m=>[m,m])]}/>}
        <div><label className="block text-[11px] text-slate-500 mb-1.5 font-bold uppercase tracking-wider">Catatan Tambahan</label><textarea value={form.catatan} onChange={e=>setForm(f=>({...f,catatan:e.target.value}))} rows={2} placeholder="Info tambahan untuk customer..." className="fi resize-none"/></div>
      </div>

      {/* Preview */}
      <div className="rounded-2xl p-5 space-y-3" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
        <div className="flex items-center gap-2">
          <p className="text-[11px] font-bold text-slate-500 uppercase tracking-widest flex-1">👁️ Preview Pesan WhatsApp</p>
          <span className="flex items-center gap-1.5 text-[11px] text-emerald-400 font-semibold"><span className="w-2 h-2 bg-emerald-400 rounded-full"></span>WhatsApp</span>
        </div>
        <div className="wa-preview">{pesan}</div>
      </div>

      {/* Log */}
      {logs.length>0&&(
        <div className="rounded-2xl overflow-hidden" style={{background:'rgba(15,23,42,.8)',border:'1px solid rgba(30,41,59,.7)'}}>
          {logs.map(l=>(
            <div key={l.id} className="flex items-center gap-3 px-4 py-3 text-sm" style={{borderBottom:'1px solid rgba(30,41,59,.4)'}}>
              <span className={`w-2 h-2 rounded-full flex-shrink-0 ${l.s==='ok'?'bg-emerald-400':l.s==='err'?'bg-rose-400':'bg-amber-400 blink'}`}></span>
              <span className="flex-1 text-slate-300">{l.msg}</span>
              <span className="text-xs text-slate-600 font-mono">{l.t}</span>
            </div>
          ))}
        </div>
      )}

      {/* Submit */}
      <button onClick={send} disabled={busy} className="w-full py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-3 transition-all" style={{background:'linear-gradient(135deg,#22c55e,#16a34a)',color:'#fff',boxShadow:'0 8px 24px rgba(34,197,94,.18)',opacity:busy?.6:1}}>
        {busy?<><Spin sz="sm"/><span>Memproses...</span></>:<><span>💬</span><span>Buka WhatsApp & Kirim Pesan</span></>}
      </button>
      <p className="text-center text-xs text-slate-600 pb-2">Data disimpan ke Google Sheets + WhatsApp terbuka via wa.me</p>
    </div>
  );
};

/* ── ROOT APP ── */
const App = () => {
  const [user,setUser]=useState(null);
  const [view,setView]=useState('dashboard');
  const [txns,setTxns]=useState(()=>DB.get('rc_txns',[]));
  const [incomes,setIncomes]=useState(()=>DB.get('rc_inc',[]));
  const [cats,setCats]=useState(()=>DB.get('rc_cats',DEF_CATS));
  const [toasts,setToasts]=useState([]);
  const [sideOpen,setSideOpen]=useState(false);

  useEffect(()=>{
    // Init local DB
    const existing=DB.get('rc_txns',[]);
    DB.set('rc_txns',existing.filter(t=>t.status==='pending'||t.status==='approved'));
    if(!DB.get('rc_v1')){DB.set('rc_cats',DEF_CATS);DB.set('rc_v1',true);}
    setCats(DB.get('rc_cats',DEF_CATS));
    const sess=DB.get('rc_sess');
    if(sess)setUser(sess);
    // Background sync — non-blocking, won't crash render
    gsGet(GS_OPEX).then(data=>{
      if(!data.length)return;
      const exp=data.filter(d=>d.type==='expense'||!d.type);
      const inc=data.filter(d=>d.type==='income');
      if(exp.length){setTxns(exp);DB.set('rc_txns',exp);}
      if(inc.length){setIncomes(inc);DB.set('rc_inc',inc);}
    });
  },[]);

  // Periodic sync — 10s, safe
  useEffect(()=>{
    const iv=setInterval(()=>{
      gsGet(GS_OPEX).then(data=>{
        if(!data.length)return;
        const exp=data.filter(d=>d.type==='expense'||!d.type);
        const inc=data.filter(d=>d.type==='income');
        if(exp.length){setTxns(exp);DB.set('rc_txns',exp);}
        if(inc.length){setIncomes(inc);DB.set('rc_inc',inc);}
      });
    },10000);
    return()=>clearInterval(iv);
  },[]);

  const addToast=useCallback((message,type='info')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,message,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4500);
  },[]);
  const removeToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);

  const login=u=>{ DB.set('rc_sess',u); setUser(u); };
  const logout=()=>{ DB.rm('rc_sess'); setUser(null); setView('dashboard'); };

  const saveTxn=t=>{const u=[t,...txns];setTxns(u);DB.set('rc_txns',u);setView('txnlist');};
  const saveInc=t=>{const u=[t,...incomes];setIncomes(u);DB.set('rc_inc',u);setView('dashboard');};
  const updTxn=async(id,patch)=>{
    const u=txns.map(t=>t.id===id?{...t,...patch}:t);
    setTxns(u);DB.set('rc_txns',u);
    if(patch.status)gsPost(GS_OPEX,{action:'update_status',id,status:patch.status});
  };

  if(!user) return <><Toast toasts={toasts} remove={removeToast}/><Login onLogin={login}/></>;

  const pages={
    dashboard: <Dashboard txns={txns} incomes={incomes} user={user} setView={setView}/>,
    upload:    <Upload cats={cats} user={user} onSave={saveTxn} toast={addToast}/>,
    txnlist:   <TxnList txns={txns} cats={cats} user={user} onUpdate={updTxn} toast={addToast}/>,
    income:    user.role==='admin'?<Income onSave={saveInc} toast={addToast}/>:null,
    wa:        <WA toast={addToast}/>,
  };

  return (
    <>
      <Toast toasts={toasts} remove={removeToast}/>
      <div className="min-h-screen bg-[#070B14] flex">
        <Sidebar view={view} setView={setView} user={user} logout={logout} open={sideOpen} setOpen={setSideOpen}/>
        <div className="flex-1 lg:ml-64 flex flex-col min-h-screen">
          <header className="sticky top-0 z-20 h-14 flex items-center gap-3 px-4 lg:px-6" style={{background:'rgba(7,11,20,.92)',backdropFilter:'blur(16px)',borderBottom:'1px solid rgba(30,41,59,.6)'}}>
            <button className="lg:hidden text-slate-500 hover:text-slate-200" onClick={()=>setSideOpen(true)}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div className="hidden sm:flex items-center gap-2 text-xs text-slate-600 font-mono">
              <span className="w-2 h-2 bg-emerald-500 rounded-full blink"></span>
              {new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
            </div>
            <div className="flex-1"/>
            {user.role==='admin'&&<span className="hidden sm:inline text-[10px] font-extrabold text-amber-400/80 px-2 py-0.5 rounded-full uppercase tracking-widest" style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.18)'}}>Admin</span>}
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-sky-400" style={{background:'rgba(14,165,233,.1)',border:'1px solid rgba(14,165,233,.2)'}}>{user.initials}</div>
              <span className="text-xs text-slate-500 hidden sm:block font-semibold">{user.name}</span>
            </div>
          </header>
          <main className="flex-1 p-4 lg:p-6 overflow-auto" key={view}>
            {pages[view]||pages.dashboard}
          </main>
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
